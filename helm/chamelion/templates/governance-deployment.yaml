{{- if .Values.governance.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-governance
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "chamelion.labels" . | nindent 4 }}
    app.kubernetes.io/component: governance
spec:
  replicas: {{ .Values.governance.replicas }}
  selector:
    matchLabels:
      {{- include "chamelion.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: governance
  template:
    metadata:
      labels:
        {{- include "chamelion.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: governance
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: governance
          image: "{{ .Values.governance.image.repository }}:{{ .Values.governance.image.tag }}"
          imagePullPolicy: {{ .Values.governance.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          env:
            - name: DB_TYPE
              value: {{ .Values.database.type | quote }}
            {{- if eq .Values.database.type "mongodb" }}
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: mongo-uri
            {{- else }}
            - name: DB_HOST
              value: {{ .Values.database.host | quote }}
            - name: DB_PORT
              value: {{ .Values.database.port | quote }}
            - name: DB_NAME
              value: {{ .Values.database.name | quote }}
            - name: DB_USER
              value: {{ .Values.database.user | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: db-password
            - name: DB_SSL
              value: {{ .Values.database.ssl | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.governance.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-governance
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "chamelion.labels" . | nindent 4 }}
    app.kubernetes.io/component: governance
spec:
  type: ClusterIP
  ports:
    - port: 3001
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "chamelion.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: governance
{{- end }}
