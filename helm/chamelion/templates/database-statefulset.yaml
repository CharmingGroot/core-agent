{{- if and .Values.governance.enabled (ne .Values.database.type "mongodb") }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-db
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "chamelion.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  serviceName: {{ .Release.Name }}-db
  replicas: 1
  selector:
    matchLabels:
      {{- include "chamelion.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        {{- include "chamelion.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: database
          {{- if eq .Values.database.type "postgres" }}
          image: postgres:16-alpine
          {{- else if or (eq .Values.database.type "mysql") (eq .Values.database.type "mariadb") }}
          {{- if eq .Values.database.type "mariadb" }}
          image: mariadb:11
          {{- else }}
          image: mysql:8
          {{- end }}
          {{- end }}
          ports:
            - name: db
              {{- if eq .Values.database.type "postgres" }}
              containerPort: 5432
              {{- else }}
              containerPort: 3306
              {{- end }}
              protocol: TCP
          env:
            {{- if eq .Values.database.type "postgres" }}
            - name: POSTGRES_DB
              value: {{ .Values.database.name | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.database.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: db-password
            {{- else }}
            - name: MYSQL_DATABASE
              value: {{ .Values.database.name | quote }}
            - name: MYSQL_USER
              value: {{ .Values.database.user | quote }}
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: db-password
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: db-root-password
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/{{ .Values.database.type }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.database.host }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "chamelion.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.database.port }}
      targetPort: db
      protocol: TCP
      name: db
  selector:
    {{- include "chamelion.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: database
{{- end }}
