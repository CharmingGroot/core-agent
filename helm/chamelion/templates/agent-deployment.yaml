{{- range .Values.agents }}
{{- if .enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $.Release.Name }}-agent-{{ .name }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    {{- include "chamelion.labels" $ | nindent 4 }}
    app.kubernetes.io/component: agent
    chamelion/agent-name: {{ .name }}
    chamelion/skill: {{ .skill }}
spec:
  replicas: {{ .replicas }}
  selector:
    matchLabels:
      {{- include "chamelion.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: agent
      chamelion/agent-name: {{ .name }}
  template:
    metadata:
      labels:
        {{- include "chamelion.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: agent
        chamelion/agent-name: {{ .name }}
        chamelion/skill: {{ .skill }}
    spec:
      {{- with $.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ $.Values.serviceAccount.name }}
      containers:
        - name: agent
          image: "{{ .image.repository }}:{{ .image.tag }}"
          imagePullPolicy: {{ .image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: AGENT_NAME
              value: {{ .name | quote }}
            - name: SKILL_NAME
              value: {{ .skill | quote }}
            - name: PROVIDER_ID
              value: {{ .provider.id | quote }}
            - name: PROVIDER_MODEL
              value: {{ .provider.model | quote }}
            {{- if .provider.baseUrl }}
            - name: PROVIDER_BASE_URL
              value: {{ .provider.baseUrl | quote }}
            {{- end }}
            - name: AUTH_TYPE
              value: {{ .provider.auth.type | quote }}
            {{- if .provider.auth.apiKey }}
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $.Release.Name }}-secrets
                  key: agent-{{ .name }}-api-key
            {{- end }}
            - name: CONTEXT_BUDGET
              value: {{ .contextBudget | quote }}
            - name: SKILLS_DIR
              value: {{ $.Values.skills.mountPath | quote }}
            - name: RULES_DIR
              value: {{ $.Values.rules.mountPath | quote }}
            - name: ORCHESTRATOR_URL
              value: "http://{{ $.Release.Name }}-orchestrator:3000"
          volumeMounts:
            - name: skills
              mountPath: {{ $.Values.skills.mountPath }}
              readOnly: true
            - name: rules
              mountPath: {{ $.Values.rules.mountPath }}
              readOnly: true
          resources:
            {{- toYaml .resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: skills
          configMap:
            name: {{ $.Values.skills.configMapName }}
        - name: rules
          configMap:
            name: {{ $.Values.rules.configMapName }}
      {{- with $.Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $.Release.Name }}-agent-{{ .name }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    {{- include "chamelion.labels" $ | nindent 4 }}
    app.kubernetes.io/component: agent
    chamelion/agent-name: {{ .name }}
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "chamelion.selectorLabels" $ | nindent 4 }}
    app.kubernetes.io/component: agent
    chamelion/agent-name: {{ .name }}
{{- end }}
{{- end }}
